{% extends "base.html" %}

{% block title %}用户登录{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">登录</h2>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label class="form-label">用户名 / 邮箱</label>
                <input type="text" name="identifier" class="form-control" placeholder="请输入用户名或邮箱" required autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" name="remember"> 下次自动登录
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px; color: var(--text-secondary);">
            还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a>
        </div>
        
        <div style="margin-top: 30px; padding: 15px; background: var(--light); border-radius: 6px; font-size: 13px;">
            <strong>测试账号：</strong><br>
            管理员: admin / admin123<br>
            用户: demo_user / demo123
        </div>
    </div>
</div>
{% endblock %}
