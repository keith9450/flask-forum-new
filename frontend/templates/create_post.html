{% extends "base.html" %}

{% block title %}发布帖子{% endblock %}

{% block content %}
<div class="main">
    <div class="content" style="max-width: 800px; margin: 0 auto;">
        <div class="card">
            <div class="card-header">
                <span>发布新帖子</span>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('posts.create_post') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    
                    <div class="form-group">
                        <label class="form-label">标题 *</label>
                        <input type="text" name="title" class="form-control" placeholder="请输入帖子标题（5-200个字符）" required minlength="5" maxlength="200">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">分类 *</label>
                        <select name="category_id" class="form-control" required>
                            <option value="">请选择分类</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">内容 *</label>
                        <textarea name="content" class="form-control" placeholder="请输入帖子内容（至少10个字符）..." required minlength="10" style="min-height: 300px;"></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">发布帖子</button>
                        <a href="{{ url_for('posts.home') }}" class="btn btn-outline">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
