{% extends "base.html" %}

{% block title %}编辑分类{% endblock %}

{% block content %}
<div class="main">
    <div class="content" style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <div class="card-header">
                <span>编辑分类</span>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.edit_category', category_id=category.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    
                    <div class="form-group">
                        <label class="form-label">名称</label>
                        <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">别名</label>
                        <input type="text" name="slug" class="form-control" value="{{ category.slug }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" name="description" class="form-control" value="{{ category.description or '' }}">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">图标</label>
                        <input type="text" name="icon" class="form-control" value="{{ category.icon or 'folder' }}">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">排序</label>
                        <input type="number" name="sort_order" class="form-control" value="{{ category.sort_order }}">
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <a href="{{ url_for('admin.categories') }}" class="btn btn-outline">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
