{% extends "base.html" %}

{% block title %}修改头像{% endblock %}

{% block content %}
<div class="main">
    <div class="content" style="max-width: 500px; margin: 0 auto;">
        <div class="card">
            <div class="card-header">
                <span>修改头像</span>
            </div>
            <div class="card-body">
                <div class="avatar-upload" style="text-align: center; padding: 30px;">
                    <div class="avatar-preview" style="width: 150px; height: 150px; margin: 0 auto 25px;">
                        <img src="{{ current_user.avatar }}" alt="当前头像" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    
                    <form method="POST" enctype="multipart/form-data">
                        <div class="form-group">
                            <input type="file" name="avatar" id="avatar" accept="image/*" required onchange="previewImage(this)">
                            <label for="avatar" style="display: inline-block; padding: 12px 30px; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); color: white; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s;">
                                选择图片
                            </label>
                        </div>
                        
                        <div id="preview-container" style="display: none; margin-top: 20px;">
                            <p style="color: var(--text-secondary); margin-bottom: 10px;">预览：</p>
                            <img id="preview-img" src="" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary);">
                        </div>
                        
                        <div style="margin-top: 25px;">
                            <button type="submit" class="btn btn-primary">上传头像</button>
                            <a href="{{ url_for('user.profile', user_id=current_user.id) }}" class="btn btn-outline">取消</a>
                        </div>
                    </form>
                    
                    <p style="color: var(--text-secondary); font-size: 13px; margin-top: 20px;">
                        支持 PNG, JPG, GIF, WEBP 格式<br>
                        建议使用正方形图片以获得最佳效果
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function previewImage(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('preview-container').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
