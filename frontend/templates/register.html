{% extends "base.html" %}

{% block title %}用户注册{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">注册</h2>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" placeholder="3-20个字符，字母、数字、下划线" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+">
            </div>
            
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" name="email" class="form-control" placeholder="请输入有效的邮箱地址" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" placeholder="至少6个字符" required minlength="6" maxlength="50">
            </div>
            
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="再次输入密码" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px; color: var(--text-secondary);">
            已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}
