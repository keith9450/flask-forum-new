{% extends "base.html" %}

{% block title %}修改密码{% endblock %}

{% block content %}
<div class="main">
    <div class="content" style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <div class="card-header">
                <span>修改密码</span>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('user.settings_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    
                    <div class="form-group">
                        <label class="form-label">当前密码</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6" maxlength="50">
                        <small style="color: var(--text-secondary);">至少6个字符</small>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">修改密码</button>
                    <a href="{{ url_for('user.profile', user_id=current_user.id) }}" class="btn btn-outline">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
